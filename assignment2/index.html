<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danica Cheng Interactive Media Assignment 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Header Section -->
    <header>
      <h1>Study Music</h1>
    </header>

    <!-- Navigation Section -->
    <nav>
  <ul class="nav-icons">
    <li>
      <a href="#">
        <img src="https://img.icons8.com/?size=100&id=8xhovyHdOQzF&format=png&color=000000" alt="Home icon">
        <span>Home</span>
      </a>
    </li>

    <li>
      <a href="#">
        <img src="https://img.icons8.com/liquid-glass/48/headphones.png" alt="Music icon">
        <span>Music</span>
      </a>
    </li>

    <li>
      <a href="#">
        <img src="https://img.icons8.com/liquid-glass/48/video.png" alt="Video Icon"></src>
        <span>Videos</span>
      </a>
    </li>

    <li>
      <a href="#">
        <img src="https://img.icons8.com/?size=100&id=nTwOT21OpiR9&format=png&color=000000" alt="Playlist icon">
        <span>Playlists</span>
      </a>
    </li>
  </ul>
</nav>

    <!-- Main Content Section -->
    <main class="container">
      <!-- Media Player Section -->
      <div class="media-player">
        <video id="custom-video-player" controls>
          <source
            src="lofi.mp4"
            type="video/mp4"
          />
        </video>
        <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"
            />
          </button>
          <!-- add the missing buttons or functionality here -->
          <div class="progress-bar">
            <span id="progress-bar-fill"></span>
          </div>
        </div>
      </div>



    
        

<div class="mode-buttons">
  <button class="mode-btn" onclick="setFocus()">Focus</button>

  <button class="mode-btn" onclick="setBreak()">
    Short Break
  </button>

  <button class="mode-btn" onclick="setLongBreak()">
    Long Break
  </button>
</div>
        
      <section class="pomodoro">
        <h2>Pomodoro Timer</h2>

          <div class="timer" id="timer">25:00</div>

         <div class="timer-buttons">
          <button onclick="startTimer()">Start</button>
          <button onclick="pauseTimer()">Pause</button>
          <button onclick="resetTimer()">Reset</button>
         </div>
      </section>
  
      <div class="quote-box">
  <p id="quote">“Stay focused, you’re doing great.”</p>
  <button onclick="newQuote()">New Quote</button>      <!-- Allows user to generate motivational quotes  -->
</div>
  
  </main>

    <!-- Footer Section -->
    <footer>
      <p>&copy; 2024 Media Player Website. All rights reserved.</p>
      <a href="https://icons8.com/icon/59862/play">Play</a> icon by
      <a href="https://icons8.com">Icons8</a>
      <a href="https://icons8.com/icon/61012/pause">Pause</a> icon by
      <a href="https://icons8.com">Icons8</a>
    </footer>
  </body>
</html>
